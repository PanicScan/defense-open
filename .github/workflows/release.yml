name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: defense-windows-x64
            binary: target/release/defense_daemon.exe
          - os: macos-latest
            artifact: defense-macos-universal
            binary: target/release/defense_daemon
          - os: ubuntu-latest
            artifact: defense-linux-x64
            binary: target/release/defense_daemon
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - if: runner.os != 'macOS'
        run: cargo build --release -p defense_daemon

      - if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release -p defense_daemon --target aarch64-apple-darwin
          cargo build --release -p defense_daemon --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create \
            -output target/release/defense_daemon \
            target/aarch64-apple-darwin/release/defense_daemon \
            target/x86_64-apple-darwin/release/defense_daemon
          lipo target/release/defense_daemon -verify_arch arm64 x86_64

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp ${{ matrix.binary }} dist/${{ matrix.artifact }}/
          cd dist/${{ matrix.artifact }}
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            sha256sum defense_daemon.exe > SHA256SUMS.txt
          else
            sha256sum defense_daemon > SHA256SUMS.txt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}/

  publish:
    needs: build
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: 'defense-*'
          merge-multiple: false

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          
          if [[ -f dist/defense-windows-x64/defense_daemon.exe ]]; then
            cp dist/defense-windows-x64/defense_daemon.exe release-assets/defense-windows-x64.exe
          fi
          if [[ -f dist/defense-macos-universal/defense_daemon ]]; then
            cp dist/defense-macos-universal/defense_daemon release-assets/defense-macos-universal
          fi
          if [[ -f dist/defense-linux-x64/defense_daemon ]]; then
            cp dist/defense-linux-x64/defense_daemon release-assets/defense-linux-x64
          fi

          cat dist/*/SHA256SUMS.txt > release-assets/SHA256SUMS.txt 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Defense ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Defense Daemon
            Sessiz çalışan dış yüzey koruma kalkanı sürümü.
            
            ### Kurulum
            Binary dosyasını indirip yönetici/root ayrıcalıklarıyla çalıştırın.
          files: release-assets/*
